        - "traefik.http.routers.music-recognizer.entrypoints=web"
        - "traefik.http.routers.music-recognizer.service=music-recognizer"
        - "traefik.http.routers.music-recognizer.middlewares=gzip,rate-limit"
        - "traefik.http.services.music-recognizer.loadbalancer.server.port=3000"
      update_config:
        parallelism: 2
        order: start-first
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      mode: replicated
      replicas: 4
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.databases != true

