services:
  traefik:
    image: traefik:v3
    command:
      - "--providers.swarm=true"
      - "--providers.swarm.exposedbydefault=false"
      - "--providers.swarm.network=traefik-public"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.transport.respondingTimeouts.idleTimeout=3600"
      - "--entrypoints.websecure.address=:443"
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--log.level=INFO"
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    networks:
      - traefik-public
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 30
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"
        # Traefik dashboard (internal)
        - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.twir.app`)"
        - "traefik.http.routers.traefik-dashboard.service=api@internal"
        - "traefik.http.routers.traefik-dashboard.entrypoints=web"
        # Dummy service required for Swarm mode
        - "traefik.http.services.traefik-noop.loadbalancer.server.port=80"
        # Global gzip compression middleware
        - "traefik.http.middlewares.gzip.compress=true"
        # Rate limiting: 1000 req/10s per IP (uses X-Forwarded-For depth=1, covering Cloudflare)
        - "traefik.http.middlewares.rate-limit.ratelimit.average=1000"
        - "traefik.http.middlewares.rate-limit.ratelimit.period=10s"
        - "traefik.http.middlewares.rate-limit.ratelimit.burst=1000"
        - "traefik.http.middlewares.rate-limit.ratelimit.sourcecriterion.ipstrategy.depth=1"

  adminer:
    image: adminer
    networks:
      - twir
      - cloudflared
      - traefik-public
    deploy:
      placement:
        constraints:
          - node.labels.databases != true
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"
        - "traefik.http.routers.twir-adminer.rule=Host(`adminer.twir.app`)"
        - "traefik.http.routers.twir-adminer.entrypoints=web"
        - "traefik.http.routers.twir-adminer.service=twir-adminer"
        - "traefik.http.services.twir-adminer.loadbalancer.server.port=8080"

  nats:
    image: nats:2.10.11-scratch
    restart: always
    command: -js -m 8222
    networks:
      - twir
      - cloudflared
      - traefik-public
    deploy:
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.databases != true
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"
        - "traefik.http.routers.twir-nats.rule=Host(`nats.twir.app`)"
        - "traefik.http.routers.twir-nats.entrypoints=web"
        - "traefik.http.routers.twir-nats.service=twir-nats"
        - "traefik.http.services.twir-nats.loadbalancer.server.port=8222"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    volumes:
      - ./configs/otel/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - twir
    deploy:
      restart_policy:
        condition: any
        delay: 3s
        max_attempts: 30
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.role == manager

  postgres:
    image: postgres:18.1
    command: postgres -c max_connections=1000 -c shared_buffers=2GB -c effective_cache_size=6GB -c maintenance_work_mem=512MB -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c default_statistics_target=100 -c random_page_cost=1.1 -c effective_io_concurrency=200 -c work_mem=32MB -c huge_pages=off -c min_wal_size=1GB -c max_wal_size=4GB -c shared_preload_libraries='pg_stat_statements'
    environment:
      POSTGRES_USER_FILE: /run/secrets/twir_postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/twir_postgres_password
      POSTGRES_DB_FILE: /run/secrets/twir_postgres_db
    secrets:
      - twir_postgres_user
      - twir_postgres_password
      - twir_postgres_db
    volumes:
      - pg18-data:/var/lib/postgresql
    networks:
      - twir
    deploy:
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.databases-1 == true

  postgres-backup:
    image: registry.twir.app/twirapp/postgres-backup:latest
    secrets:
      - twir_doppler_token
    networks:
      - twir
    deploy:
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.databases == true

  pgdog:
    image: ghcr.io/pgdogdev/pgdog:v0.1.34
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "cp /pgdog/start.sh /tmp/start.sh && chmod +x /tmp/start.sh && exec /tmp/start.sh",
      ]
    secrets:
      - twir_postgres_db
      - twir_postgres_password
      - twir_postgres_user
    configs:
      - source: pgdog_start_script
        target: /pgdog/start.sh
      - source: pgdog_config
        target: /pgdog/pgdog.toml
      - source: pgdog_users_config
        target: /pgdog/users_base.toml
    networks:
      - twir
    deploy:
      update_config:
        parallelism: 1
        order: stop-first
      mode: replicated
      replicas: 3
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      endpoint_mode: dnsrr

  pgbouncer:
    image: bitnamilegacy/pgbouncer:1.23.1
    secrets:
      - twir_postgres_user
      - twir_postgres_password
      - twir_postgres_db
    environment:
      - POSTGRESQL_HOST=postgres
      - POSTGRESQL_USERNAME_FILE=/run/secrets/twir_postgres_user
      - POSTGRESQL_PASSWORD_FILE=/run/secrets/twir_postgres_password
      - POSTGRESQL_DATABASE_FILE=/run/secrets/twir_postgres_db

      - PGBOUNCER_AUTH_USER=twir
      - PGBOUNCER_DATABASE=twir
      - PGBOUNCER_DEFAULT_POOL_SIZE=19
      - PGBOUNCER_MIN_POOL_SIZE=10
      - PGBOUNCER_MAX_CLIENT_CONN=4000
      - PGBOUNCER_POOL_MODE=transaction
    networks:
      - twir
    deploy:
      update_config:
        parallelism: 2
        order: start-first
      mode: replicated
      replicas: 5
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      endpoint_mode: dnsrr

  clickhouse:
    image: clickhouse/clickhouse-server:25.5-alpine
    networks:
      - twir
      - cloudflared
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    configs:
      - source: clickhouse_config
        target: /etc/clickhouse-server/config.d/override.xml
    environment:
      - CLICKHOUSE_USER=twir
      - CLICKHOUSE_PASSWORD=twir
      - CLICKHOUSE_DB=twir
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
      restart_policy:
        condition: on-failure
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.databases-1 == true
    ulimits:
      nofile: 262144
    cap_add:
      - SYS_NICE
      - NET_ADMIN
      - IPC_LOCK

  temporal-postgres:
    image: "bitnamilegacy/postgresql:17"
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
      POSTGRESQL_POSTGRES_PASSWORD: temporal
    volumes:
      - temporal-postgres-data:/bitnami/postgresql
    networks:
      - twir
    deploy:
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.databases-1 == true

  temporal:
    depends_on:
      - postgres
    image: twirapp/temporal:latest
    networks:
      - twir
    secrets:
      - twir_postgres_user
      - twir_postgres_password
    deploy:
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      endpoint_mode: dnsrr
      labels:
        kompose.volume.type: configMap
      placement:
        constraints:
          - node.labels.databases != true

  temporal-ui:
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    image: temporalio/ui:2.21.0
    networks:
      - twir
      - cloudflared
      - traefik-public
    deploy:
      placement:
        constraints:
          - node.labels.databases != true
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"
        - "traefik.http.routers.twir-temporal.rule=Host(`temporal.twir.app`)"
        - "traefik.http.routers.twir-temporal.entrypoints=web"
        - "traefik.http.routers.twir-temporal.service=twir-temporal"
        - "traefik.http.services.twir-temporal.loadbalancer.server.port=8080"

  migrations:
    image: registry.twir.app/twirapp/migrations:latest
    secrets:
      - twir_doppler_token
    networks:
      - twir
    deploy:
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 30
    healthcheck:
      test: exit 0

  redis:
    image: redis:8.0.2
    command: redis-server --save 60 1 --loglevel warning --io-threads 4
    volumes:
      - redis-data:/data
    networks:
      - twir
    deploy:
      restart_policy:
        condition: any
        delay: 3s
        max_attempts: 30
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.databases == true

  api-gql:
    image: registry.twir.app/twirapp/api-gql:latest
    secrets:
      - twir_doppler_token
    networks:
      - twir
      - traefik-public
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"

        # Shared service definition
        - "traefik.http.services.twir-api-gql.loadbalancer.server.port=3009"

        # /api route for twir.app
        - "traefik.http.routers.twir-api.rule=Host(`twir.app`) && PathPrefix(`/api`)"
        - "traefik.http.routers.twir-api.entrypoints=web"
        - "traefik.http.routers.twir-api.service=twir-api-gql"
        - "traefik.http.routers.twir-api.middlewares=api-stripprefix,gzip,rate-limit"
        - "traefik.http.routers.twir-api.priority=20"
        - "traefik.http.middlewares.api-stripprefix.stripprefix.prefixes=/api"

        # /s shortener route for twir.app
        - "traefik.http.routers.twir-shortener.rule=Host(`twir.app`) && PathPrefix(`/s/`)"
        - "traefik.http.routers.twir-shortener.entrypoints=web"
        - "traefik.http.routers.twir-shortener.service=twir-api-gql"
        - "traefik.http.routers.twir-shortener.middlewares=shortener-rewrite,gzip,rate-limit"
        - "traefik.http.routers.twir-shortener.priority=20"
        - "traefik.http.middlewares.shortener-rewrite.replacepathregex.regex=^/s/(.*)"
        - "traefik.http.middlewares.shortener-rewrite.replacepathregex.replacement=/v1/short-links/$${1}"

        # /api route for cf.twir.app
        - "traefik.http.routers.cf-api.rule=Host(`cf.twir.app`) && PathPrefix(`/api`)"
        - "traefik.http.routers.cf-api.entrypoints=web"
        - "traefik.http.routers.cf-api.service=twir-api-gql"
        - "traefik.http.routers.cf-api.middlewares=api-stripprefix,gzip,rate-limit"
        - "traefik.http.routers.cf-api.priority=20"

        # /s shortener route for cf.twir.app
        - "traefik.http.routers.cf-shortener.rule=Host(`cf.twir.app`) && PathPrefix(`/s/`)"
        - "traefik.http.routers.cf-shortener.entrypoints=web"
        - "traefik.http.routers.cf-shortener.service=twir-api-gql"
        - "traefik.http.routers.cf-shortener.middlewares=shortener-rewrite,gzip,rate-limit"
        - "traefik.http.routers.cf-shortener.priority=20"

        # Catch-all: any unmatched host → /v1/short-links{path} (lowest priority)
        - "traefik.http.routers.twir-custom-domain.rule=HostRegexp(`{host:.+}`)"
        - "traefik.http.routers.twir-custom-domain.entrypoints=web"
        - "traefik.http.routers.twir-custom-domain.service=twir-api-gql"
        - "traefik.http.routers.twir-custom-domain.middlewares=custom-domain-rewrite,gzip,rate-limit"
        - "traefik.http.routers.twir-custom-domain.priority=1"
        - "traefik.http.middlewares.custom-domain-rewrite.replacepathregex.regex=^(.*)"
        - "traefik.http.middlewares.custom-domain-rewrite.replacepathregex.replacement=/v1/short-links$${1}"

      update_config:
        parallelism: 2
        order: start-first
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
      endpoint_mode: dnsrr
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.databases != true

  bots:
    image: registry.twir.app/twirapp/bots:latest
    secrets:
      - twir_doppler_token
    networks:
      - traefik-public
      - twir
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"
        - "traefik.http.routers.twir-bots.rule=Host(`services-bots.twir.app`)"
        - "traefik.http.routers.twir-bots.entrypoints=web"
        - "traefik.http.routers.twir-bots.service=twir-bots"
        - "traefik.http.routers.twir-bots.middlewares=gzip,rate-limit"
        - "traefik.http.services.twir-bots.loadbalancer.server.port=3000"
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      endpoint_mode: dnsrr
      replicas: 4
      mode: replicated
      update_config:
        parallelism: 2
        order: start-first
      placement:
        constraints:
          - node.labels.databases != true

  parser:
    image: registry.twir.app/twirapp/parser:latest
    secrets:
      - twir_doppler_token
    deploy:
      update_config:
        parallelism: 2
        order: start-first
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      mode: replicated
      replicas: 6
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.databases != true
    networks:
      - twir

  timers:
    image: registry.twir.app/twirapp/timers:latest
    secrets:
      - twir_doppler_token
    networks:
      - twir
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.databases != true

  scheduler:
    image: registry.twir.app/twirapp/scheduler:latest
    secrets:
      - twir_doppler_token
    networks:
      - twir
    deploy:
      update_config:
        order: start-first
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.databases != true

  eventsub:
    image: registry.twir.app/twirapp/eventsub:latest
    secrets:
      - twir_doppler_token
    networks:
      - twir
      - traefik-public
      - cloudflared
    environment:
      REPLICA: "{{.Task.Slot}}"
    deploy:
      mode: replicated
      replicas: 3
      update_config:
        parallelism: 1
        order: start-first
      endpoint_mode: dnsrr
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      placement:
        constraints:
          - node.labels.databases != true

  integrations:
    image: registry.twir.app/twirapp/integrations:latest
    secrets:
      - twir_doppler_token
    networks:
      - twir
    deploy:
      update_config:
        order: start-first
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      endpoint_mode: dnsrr

  web:
    image: registry.twir.app/twirapp/web:latest
    secrets:
      - twir_doppler_token
    networks:
      - twir
      - traefik-public
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"
        # twir.app catch-all (lower priority than path-specific routes)
        - "traefik.http.routers.twir-web.rule=Host(`twir.app`)"
        - "traefik.http.routers.twir-web.entrypoints=web"
        - "traefik.http.routers.twir-web.service=twir-web"
        - "traefik.http.routers.twir-web.middlewares=gzip,rate-limit"
        - "traefik.http.routers.twir-web.priority=10"
        # cf.twir.app catch-all
        - "traefik.http.routers.cf-web.rule=Host(`cf.twir.app`)"
        - "traefik.http.routers.cf-web.entrypoints=web"
        - "traefik.http.routers.cf-web.service=twir-web"
        - "traefik.http.routers.cf-web.middlewares=gzip,rate-limit"
        - "traefik.http.routers.cf-web.priority=10"
        - "traefik.http.services.twir-web.loadbalancer.server.port=3000"
      update_config:
        order: start-first
        parallelism: 2
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      resources:
        limits:
          cpus: "0.5"
          memory: 1500M
      mode: replicated
      replicas: 4
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.databases != true

  dashboard:
    image: registry.twir.app/twirapp/dashboard:latest
    command: --gzip --brotli --threshold 500 --ignore-cache-control-paths "/sw.js,/index.html,/manifest.webmanifest,/pluginWebUpdateNotice/web_version_by_plugin.json"
    secrets:
      - twir_doppler_token
    networks:
      - twir
      - traefik-public
      - cloudflared
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"
        # twir.app/dashboard
        - "traefik.http.routers.twir-dashboard.rule=Host(`twir.app`) && PathPrefix(`/dashboard`)"
        - "traefik.http.routers.twir-dashboard.entrypoints=web"
        - "traefik.http.routers.twir-dashboard.service=twir-dashboard"
        - "traefik.http.routers.twir-dashboard.middlewares=dashboard-stripprefix,gzip,rate-limit"
        - "traefik.http.routers.twir-dashboard.priority=20"
        - "traefik.http.middlewares.dashboard-stripprefix.stripprefix.prefixes=/dashboard"
        # cf.twir.app/dashboard
        - "traefik.http.routers.cf-dashboard.rule=Host(`cf.twir.app`) && PathPrefix(`/dashboard`)"
        - "traefik.http.routers.cf-dashboard.entrypoints=web"
        - "traefik.http.routers.cf-dashboard.service=twir-dashboard"
        - "traefik.http.routers.cf-dashboard.middlewares=dashboard-stripprefix,gzip,rate-limit"
        - "traefik.http.routers.cf-dashboard.priority=20"
        - "traefik.http.services.twir-dashboard.loadbalancer.server.port=8080"
      update_config:
        order: start-first
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.databases != true

  overlays:
    image: registry.twir.app/twirapp/overlays:latest
    command: --gzip --brotli --threshold 500
    networks:
      - twir
      - traefik-public
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"
        # twir.app/overlays
        - "traefik.http.routers.twir-overlays.rule=Host(`twir.app`) && PathPrefix(`/overlays`)"
        - "traefik.http.routers.twir-overlays.entrypoints=web"
        - "traefik.http.routers.twir-overlays.service=twir-overlays"
        - "traefik.http.routers.twir-overlays.middlewares=overlays-stripprefix,gzip,rate-limit"
        - "traefik.http.routers.twir-overlays.priority=20"
        - "traefik.http.middlewares.overlays-stripprefix.stripprefix.prefixes=/overlays"
        # cf.twir.app/overlays
        - "traefik.http.routers.cf-overlays.rule=Host(`cf.twir.app`) && PathPrefix(`/overlays`)"
        - "traefik.http.routers.cf-overlays.entrypoints=web"
        - "traefik.http.routers.cf-overlays.service=twir-overlays"
        - "traefik.http.routers.cf-overlays.middlewares=overlays-stripprefix,gzip,rate-limit"
        - "traefik.http.routers.cf-overlays.priority=20"
        - "traefik.http.services.twir-overlays.loadbalancer.server.port=8080"
      update_config:
        order: start-first
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.databases != true

  websockets:
    image: registry.twir.app/twirapp/websockets:latest
    secrets:
      - twir_doppler_token
    networks:
      - twir
      - traefik-public
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"
        # twir.app/socket (WebSocket — no gzip)
        - "traefik.http.routers.twir-websockets.rule=Host(`twir.app`) && PathPrefix(`/socket`)"
        - "traefik.http.routers.twir-websockets.entrypoints=web"
        - "traefik.http.routers.twir-websockets.service=twir-websockets"
        - "traefik.http.routers.twir-websockets.middlewares=socket-stripprefix,rate-limit"
        - "traefik.http.routers.twir-websockets.priority=20"
        - "traefik.http.middlewares.socket-stripprefix.stripprefix.prefixes=/socket"
        # cf.twir.app/socket
        - "traefik.http.routers.cf-websockets.rule=Host(`cf.twir.app`) && PathPrefix(`/socket`)"
        - "traefik.http.routers.cf-websockets.entrypoints=web"
        - "traefik.http.routers.cf-websockets.service=twir-websockets"
        - "traefik.http.routers.cf-websockets.middlewares=socket-stripprefix,rate-limit"
        - "traefik.http.routers.cf-websockets.priority=20"
        - "traefik.http.services.twir-websockets.loadbalancer.server.port=3004"
      resources:
        limits:
          cpus: "1.0"
          memory: 3G
      update_config:
        order: start-first
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 30
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.databases != true

  tokens:
    image: registry.twir.app/twirapp/tokens:latest
    secrets:
      - twir_doppler_token
