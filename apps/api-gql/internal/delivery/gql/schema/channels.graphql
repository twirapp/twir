extend type Query {
	channelBySlug(channelName: String!, platform: Platform): TwirPublicUser
	channelPlatformBindings: [ChannelPlatformBinding!]!
		@isAuthenticated
		@hasAccessToSelectedDashboard
		@hasChannelRolesDashboardPermission(permission: VIEW_BOT_SETTINGS)
	channelPlatformOptions: [ChannelPlatformOption!]!
		@isAuthenticated
		@hasAccessToSelectedDashboard
		@hasChannelRolesDashboardPermission(permission: VIEW_BOT_SETTINGS)
}

extend type Mutation {
	channelPlatformConnect(platform: Platform!): String!
		@isAuthenticated
		@hasAccessToSelectedDashboard
		@hasChannelRolesDashboardPermission(permission: MANAGE_BOT_SETTINGS)
	channelPlatformDisconnect(platform: Platform!): Boolean!
		@isAuthenticated
		@hasAccessToSelectedDashboard
		@hasChannelRolesDashboardPermission(permission: MANAGE_BOT_SETTINGS)
	channelPlatformSetEnabled(platform: Platform!, enabled: Boolean!): ChannelPlatformBinding!
		@isAuthenticated
		@hasAccessToSelectedDashboard
		@hasChannelRolesDashboardPermission(permission: MANAGE_BOT_SETTINGS)
}

type ChannelPlatformBinding {
	id: UUID!
	platform: Platform!
	userId: UUID!
	platformChannelId: String!
	enabled: Boolean!
	platformUserId: String!
	platformLogin: String!
	platformDisplayName: String!
	platformAvatar: String
	capabilities: [PlatformCapability!]!
}

type ChannelPlatformOption {
	platform: Platform!
	capabilities: [PlatformCapability!]!
}

type TwirPublicUser {
	id: UUID!
	hideOnLandingPage: Boolean!
	twitchProfile: TwirUserTwitchInfo
	kickProfile: KickProfile
}
