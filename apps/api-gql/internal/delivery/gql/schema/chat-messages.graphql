extend type Query {
	chatMessages(input: ChatMessageInput!): [ChatMessage!]! @isAuthenticated @hasAccessToSelectedDashboard
}

extend type Subscription {
	chatMessages: ChatMessage! @isAuthenticated @hasAccessToSelectedDashboard
	chatMessagesByApiKey(apiKey: String!): ChatMessage!
	adminChatMessages: ChatMessage! @isAuthenticated @hasAccessToSelectedDashboard @isAdmin
}

input ChatMessageInput {
	platformIn: [String!]
	userIdIn: [String!]
	userNameLike: String @validate(constraint: "max=40")
	textLike: String @validate(constraint: "max=500")
	page: Int @validate(constraint: "gte=0")
	perPage: Int @validate(constraint: "lte=1000")
}

type ChatMessage {
	id: UUID!
	platform: String!
	channelId: String!
	channelLogin: String!
	channelName: String!
	userID: String!
	userName: String!
	userDisplayName: String!
	userColor: String!
	text: String!
	createdAt: Time!
	messageId: String
	messageType: String
	announceColor: String
	badges: [ChatMessageBadge!]!
	fragments: [ChatMessageFragment!]!
}

type ChatMessageBadge {
	setId: String!
	versionId: String
	text: String
}

type ChatMessageFragment {
	type: String!
	text: String!
	emoteId: String
	emoteUrl: String
}
