apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: twir
  labels:
    app.kubernetes.io/name: postgres
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: twir
  labels:
    app.kubernetes.io/name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      serviceAccountName: twir-workloads
      nodeSelector:
        twir.app/database-primary: "true"
      containers:
        - name: postgres
          image: postgres:18.1
          args:
            - postgres
            - -c
            - max_connections=1000
            - -c
            - shared_buffers=2GB
            - -c
            - effective_cache_size=6GB
            - -c
            - maintenance_work_mem=512MB
            - -c
            - checkpoint_completion_target=0.9
            - -c
            - wal_buffers=16MB
            - -c
            - default_statistics_target=100
            - -c
            - random_page_cost=1.1
            - -c
            - effective_io_concurrency=200
            - -c
            - work_mem=32MB
            - -c
            - huge_pages=off
            - -c
            - min_wal_size=1GB
            - -c
            - max_wal_size=4GB
            - -c
            - shared_preload_libraries=pg_stat_statements
          env:
            - name: POSTGRES_USER_FILE
              value: /run/secrets/twir_postgres_user
            - name: POSTGRES_PASSWORD_FILE
              value: /run/secrets/twir_postgres_password
            - name: POSTGRES_DB_FILE
              value: /run/secrets/twir_postgres_db
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: twir-secrets
              mountPath: /run/secrets
              readOnly: true
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: twir-secrets
          secret:
            secretName: twir-secrets
            items:
              - key: TWIR_POSTGRES_USER
                path: twir_postgres_user
              - key: TWIR_POSTGRES_PASSWORD
                path: twir_postgres_password
              - key: TWIR_POSTGRES_DB
                path: twir_postgres_db
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: twir
  labels:
    app.kubernetes.io/name: clickhouse
spec:
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: twir
  labels:
    app.kubernetes.io/name: clickhouse
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
    spec:
      serviceAccountName: twir-workloads
      nodeSelector:
        twir.app/database-primary: "true"
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:25.5-alpine
          env:
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: twir-secrets
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: twir-secrets
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DB
              valueFrom:
                secretKeyRef:
                  name: twir-secrets
                  key: CLICKHOUSE_DB
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          resources:
            limits:
              cpu: "2"
              memory: 3Gi
          securityContext:
            capabilities:
              add:
                - SYS_NICE
                - NET_ADMIN
                - IPC_LOCK
          volumeMounts:
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
            - name: clickhouse-config
              mountPath: /etc/clickhouse-server/config.d/override.xml
              subPath: override.xml
      volumes:
        - name: clickhouse-data
          persistentVolumeClaim:
            claimName: clickhouse-data
        - name: clickhouse-config
          configMap:
            name: clickhouse-config
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: twir
  labels:
    app.kubernetes.io/name: redis
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: twir
  labels:
    app.kubernetes.io/name: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      serviceAccountName: twir-workloads
      nodeSelector:
        twir.app/cache: "true"
      containers:
        - name: redis
          image: redis:8.0.2
          command:
            - redis-server
          args:
            - --save
            - "60"
            - "1"
            - --loglevel
            - warning
            - --io-threads
            - "4"
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-postgres
  namespace: twir
  labels:
    app.kubernetes.io/name: temporal-postgres
spec:
  selector:
    app.kubernetes.io/name: temporal-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: temporal-postgres
  namespace: twir
  labels:
    app.kubernetes.io/name: temporal-postgres
spec:
  serviceName: temporal-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal-postgres
    spec:
      serviceAccountName: twir-workloads
      nodeSelector:
        twir.app/database-primary: "true"
      containers:
        - name: temporal-postgres
          image: bitnamilegacy/postgresql:17
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: twir-secrets
                  key: TEMPORAL_POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: twir-secrets
                  key: TEMPORAL_POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: twir-secrets
                  key: TEMPORAL_POSTGRES_DB
            - name: POSTGRESQL_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: twir-secrets
                  key: TEMPORAL_POSTGRES_PASSWORD
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: temporal-postgres-data
              mountPath: /bitnami/postgresql
      volumes:
        - name: temporal-postgres-data
          persistentVolumeClaim:
            claimName: temporal-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: twir
  labels:
    app.kubernetes.io/name: nats
spec:
  selector:
    app.kubernetes.io/name: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: twir
  labels:
    app.kubernetes.io/name: nats
spec:
  serviceName: nats
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
    spec:
      serviceAccountName: twir-workloads
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: twir.app/database
                    operator: DoesNotExist
      containers:
        - name: nats
          image: nats:2.10.11-scratch
          args:
            - -js
            - -m
            - "8222"
            - -sd
            - /data/jetstream
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          volumeMounts:
            - name: nats-data
              mountPath: /data
      volumes:
        - name: nats-data
          persistentVolumeClaim:
            claimName: nats-data
