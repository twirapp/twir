apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: twir
  labels:
    app.kubernetes.io/name: clickhouse
data:
  override.xml: |
    <?xml version="1.0"?>
    <clickhouse>
      <!-- Disabling system log tables to prevent disk space usage -->
      <asynchronous_metric_log remove="1"/>
      <metric_log remove="1"/>
      <query_thread_log remove="1"/>
      <query_views_log remove="1"/>
      <part_log remove="1"/>
      <session_log remove="1"/>
      <text_log remove="1"/>
      <trace_log remove="1"/>
      <crash_log remove="1"/>
      <opentelemetry_span_log remove="1"/>
      <zookeeper_log remove="1"/>
      <processors_profile_log remove="1"/>
      <latency_log remove="1"/>
      <query_log replace="1">
        <database>system</database>
        <table>query_log</table>
        <engine>ENGINE = MergeTree PARTITION BY (event_date) ORDER BY (event_time) TTL event_date + INTERVAL 1 DAY DELETE</engine>
        <flush_interval_milliseconds>7500</flush_interval_milliseconds>
      </query_log>
      <logger>
        <level>warning</level>
      </logger>
      <profiles>
        <default>
          <log_queries>0</log_queries>
          <log_query_threads>0</log_query_threads>
        </default>
      </profiles>
    </clickhouse>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgdog-config
  namespace: twir
  labels:
    app.kubernetes.io/name: pgdog
data:
  pgdog.toml: |
    [general]
    min_pool_size = 1
    default_pool_size = 30
    pooler_mode = "transaction"

    [admin]
    password = "replace-with-secret-management"

    [[databases]]
    name = "twir"
    host = "postgres"
    port = 5432
  start.sh: |
    #!/bin/sh
    set -eu
    cat > /pgdog/users.toml <<EOF
    [[users]]
    name = "${TWIR_POSTGRES_USER}"
    database = "${TWIR_POSTGRES_DB}"
    password = "${TWIR_POSTGRES_PASSWORD}"
    server_user = "${TWIR_POSTGRES_USER}"
    server_password = "${TWIR_POSTGRES_PASSWORD}"
    EOF
    exec /usr/local/bin/pgdog
