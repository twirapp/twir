---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: twir
  labels:
    app.kubernetes.io/name: dashboard
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard
    spec:
      serviceAccountName: twir-workloads
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: twir.app/database
                    operator: DoesNotExist
      containers:
        - name: dashboard
          image: registry.twir.app/twirapp/dashboard:latest
          args:
            - --gzip
            - --brotli
            - --threshold
            - 500
            - --ignore-cache-control-paths
            - "/sw.js,/index.html,/manifest.webmanifest,/pluginWebUpdateNotice/web_version_by_plugin.json"
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DOPPLER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: twir-secrets
                  key: TWIR_DOPPLER_TOKEN
