apiVersion: v1
kind: Service
metadata:
  name: api-gql
  namespace: twir
  labels:
    app.kubernetes.io/name: api-gql
spec:
  selector:
    app.kubernetes.io/name: api-gql
  ports:
    - name: http
      port: 3009
      targetPort: 3009
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gql
  namespace: twir
  labels:
    app.kubernetes.io/name: api-gql
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gql
    spec:
      serviceAccountName: twir-workloads
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: twir.app/database
                    operator: DoesNotExist
      containers:
        - name: api-gql
          image: registry.twir.app/twirapp/api-gql:latest
          ports:
            - name: http
              containerPort: 3009
          env:
            - name: DOPPLER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: twir-secrets
                  key: TWIR_DOPPLER_TOKEN
          resources:
            limits:
              cpu: "2"
              memory: 3Gi
---
