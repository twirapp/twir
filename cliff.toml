# git-cliff ~ configuration
# https://git-cliff.org/docs/configuration/

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""

body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/pull/{{ commit.remote.pr_number }})){% endif %} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }}))
    {%- endfor %}
{% endfor %}
"""

footer = """
<!-- generated by git-cliff -->
"""

trim = true

postprocessors = []

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_preprocessors = []

commit_parsers = [
  { message = "^feat", group = "🚀 Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^doc", group = "📚 Documentation" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^refactor", group = "🚜 Refactor" },
  { message = "^style", group = "🎨 Styling" },
  { message = "^test", group = "🧪 Testing" },
  { message = "^ci", group = "⚙️ Miscellaneous Tasks" },
  { message = "^build", group = "📦 Build System" },
  { message = "^chore\\(release\\):", skip = true },
  { message = "^chore", group = "⚙️ Miscellaneous Tasks" },
  { body = ".*security", group = "🛡️ Security" },
  { message = "^revert", group = "◀️ Revert" },
]

protect_breaking_commits = false
filter_commits = true
tag_pattern = "^[v]?[0-9]+\\.[0-9]+\\.[0-9]+$"
topo_order = false
sort_commits = "newest"

link_parsers = [{ pattern = "#(\\d+)", href = "https://github.com/twirapp/twir/issues/$1" }]

[remote]
name = "origin"
url = "https://github.com/twirapp/twir"

[remote.github]
owner = "twirapp"
repo = "twir"

[bump]
features_always_bump_minor = false
breaking_always_bump_major = true
